<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SpiritForms 1.0 Preview Images</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
      color: #f5f5f5;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #1f1f1f;
      border-bottom: 1px solid #444;
    }

    header h1 {
      margin: 0 0 10px 0;
      font-size: 28px;
    }

    header a {
      color: #8ecbff;
      text-decoration: none;
      font-size: 16px;
    }

    .viewer {
      max-width: 1100px;
      margin: 20px auto;
      padding: 0 16px;
      text-align: center;
    }

    .main-image-wrap {
      background: #000;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px;
    }

    #mainImage {
      max-width: 100%;
      max-height: 70vh;
      border-radius: 4px;
    }

    .caption {
      margin-top: 10px;
      font-size: 15px;
      color: #ddd;
    }

    .controls {
      margin: 16px 0;
    }

    button {
      padding: 8px 16px;
      margin: 4px;
      font-size: 15px;
      border: 1px solid #777;
      border-radius: 5px;
      background: #2b2b2b;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #3a3a3a;
    }

    .thumbnails {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }

    .thumbnails img {
      width: 130px;
      height: 80px;
      object-fit: cover;
      border: 2px solid #444;
      border-radius: 5px;
      cursor: pointer;
      opacity: 0.75;
    }

    .thumbnails img:hover,
    .thumbnails img.active {
      border-color: #8ecbff;
      opacity: 1;
    }
  </style>
</head>

<body>
  <header>
    <h1>SpiritForms 1.0 Preview Images</h1>
    <a href="index.html">← Back to SpiritForms 1.0</a>
  </header>

  <main class="viewer">
    <div class="main-image-wrap">
      <img id="mainImage" src="" alt="SpiritForms 1.0 preview image">
    </div>

    <div class="caption" id="caption"></div>

    <div class="controls">
      <button onclick="previousImage()">Previous</button>
      <button onclick="toggleAutoPlay()" id="playPauseButton">Pause Slideshow</button>
      <button onclick="nextImage()">Next</button>
    </div>

    <div class="thumbnails" id="thumbnails"></div>
  </main>

  <script>
    /*
      IMPORTANT:
      GitHub Pages cannot automatically read all files from the previews folder.
      The 11 image filenames must be listed below.
      Replace these names with your actual filenames.
    */

    const images = [
      "LocationContact.JPG",
      "History.JPG",
      "Witness.JPG",
      "Investigation.JPG",
      "PersonalExperiences.JPG",
      "Audio.JPG",
      "Video.JPG",
      "Photo.JPG",
      "SensorData.JPG",
      "Summary.JPG",
      "Reports.JPG",
      "Maintenance.JPG"
    ];

    const folder = "previews/";
    let currentIndex = 0;
    let autoPlay = true;
    let timer = null;

    const mainImage = document.getElementById("mainImage");
    const caption = document.getElementById("caption");
    const thumbnails = document.getElementById("thumbnails");
    const playPauseButton = document.getElementById("playPauseButton");

    function showImage(index) {
      currentIndex = index;

      const imagePath = folder + images[currentIndex];
      mainImage.src = encodeURI(imagePath);
      mainImage.alt = "SpiritForms 1.0 preview image " + (currentIndex + 1);

      caption.textContent = "Image " + (currentIndex + 1) + " of " + images.length + " — " + images[currentIndex];

      document.querySelectorAll(".thumbnails img").forEach((thumb, i) => {
        thumb.classList.toggle("active", i === currentIndex);
      });
    }

    function nextImage() {
      const next = (currentIndex + 1) % images.length;
      showImage(next);
      restartTimer();
    }

    function previousImage() {
      const previous = (currentIndex - 1 + images.length) % images.length;
      showImage(previous);
      restartTimer();
    }

    function toggleAutoPlay() {
      autoPlay = !autoPlay;

      if (autoPlay) {
        playPauseButton.textContent = "Pause Slideshow";
        startTimer();
      } else {
        playPauseButton.textContent = "Start Slideshow";
        stopTimer();
      }
    }

    function startTimer() {
      stopTimer();
      timer = setInterval(() => {
        nextImage();
      }, 5000);
    }

    function stopTimer() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }

    function restartTimer() {
      if (autoPlay) {
        startTimer();
      }
    }

    function buildThumbnails() {
      thumbnails.innerHTML = "";

      images.forEach((imageName, index) => {
        const thumb = document.createElement("img");
        thumb.src = encodeURI(folder + imageName);
        thumb.alt = "Preview thumbnail " + (index + 1);
        thumb.onclick = () => {
          showImage(index);
          restartTimer();
        };
        thumbnails.appendChild(thumb);
      });
    }

    buildThumbnails();
    showImage(0);
    startTimer();
  </script>
</body>
</html>
